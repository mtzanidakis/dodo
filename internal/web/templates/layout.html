{{define "page"}}<!doctype html>
<html lang="{{.Lang}}"{{if .ThemeClass}} class="{{.ThemeClass}}"{{end}}>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRF}}">
<meta name="color-scheme" content="{{.ColorScheme}}">
<title>{{.Title}} · dodo</title>
<link rel="stylesheet" href="/static/{{.AssetVersion}}/app.css">
<script src="/static/{{.AssetVersion}}/vendor.js" defer></script>
<script src="/static/{{.AssetVersion}}/app.js" defer></script>
</head>
<body hx-headers='{"X-CSRF-Token":"{{.CSRF}}"}'>
{{if .User}}
<header class="topbar">
  <a class="brand" href="/"><span class="dot"></span>dodo</a>
  <nav>
    <a href="/" class="{{if eq .Nav "tasks"}}active{{end}}">{{t .Lang "nav.tasks"}}</a>
    <form method="POST" action="/ui/locale" class="lang-form">
      <input type="hidden" name="_csrf" value="{{.CSRF}}">
      <select name="locale" class="btn btn-sm" title="{{t .Lang "field.locale"}}" onchange="this.form.submit()">
        <option value="en" {{if eq (printf "%s" .User.Locale) "en"}}selected{{end}}>EN</option>
        <option value="el" {{if eq (printf "%s" .User.Locale) "el"}}selected{{end}}>ΕΛ</option>
      </select>
    </form>
    <div class="theme-toggle" role="group" aria-label="{{t .Lang "field.theme"}}">
      <button type="button" data-set-theme="system" title="{{t .Lang "theme.system"}}">◐</button>
      <button type="button" data-set-theme="light" title="{{t .Lang "theme.light"}}">☀</button>
      <button type="button" data-set-theme="dark" title="{{t .Lang "theme.dark"}}">☾</button>
    </div>
    <details class="usermenu">
      <summary>
        <span class="avatar">{{slice .User.Email 0 1}}</span>
        <span class="who">{{.User.Email}}</span>
        <span class="caret" aria-hidden="true">▾</span>
      </summary>
      <div class="menu card">
        <a href="/tokens" class="{{if eq .Nav "tokens"}}active{{end}}">{{t .Lang "nav.tokens"}}</a>
        <a href="/account" class="{{if eq .Nav "account"}}active{{end}}">{{t .Lang "nav.account"}}</a>
        <hr>
        <a href="/logout">{{t .Lang "nav.logout"}}</a>
      </div>
    </details>
  </nav>
</header>
{{end}}
<main>
{{template "content" .}}
</main>
<div id="toasts"></div>
</body>
</html>{{end}}
