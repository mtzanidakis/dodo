version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      go-modules:
        patterns: ["*"]

  # GitHub Actions used in the workflows (kept SHA-pinned)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]

  # Frontend vendoring toolchain
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      npm:
        patterns: ["*"]

  # Base image in the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
