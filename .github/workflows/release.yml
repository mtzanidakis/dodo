name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise run web:build
      - run: mise run lint
      - run: go test -race ./...
      - run: mise run build-all

  goreleaser:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}