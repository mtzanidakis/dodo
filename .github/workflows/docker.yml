name: docker

on:
  push:
    tags: ["v*"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise run web:build
      - run: mise run lint
      - run: go test -race ./...
      - run: mise run build-all

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mtzanidakis/dodo:${{ github.ref_name }}
            ghcr.io/mtzanidakis/dodo:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
      # v5 is the latest release and still runs on Node 20 (no Node 24
      # release upstream yet); it emits a deprecation warning, not an error.
      - uses: actions/delete-package-versions@v5
        with:
          package-name: dodo
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
