version: 2

project_name: dodo

before:
  hooks:
    - go mod tidy

builds:
  - id: dodo-cli
    main: ./cmd/dodo-cli
    binary: dodo-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: dodo-tui
    main: ./cmd/dodo-tui
    binary: dodo-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: dodo-cli
    ids: [dodo-cli]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: dodo-tui
    ids: [dodo-tui]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

sboms:
  - id: dodo
    artifacts: archive

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: mtzanidakis
    name: dodo
  draft: false
  prerelease: auto