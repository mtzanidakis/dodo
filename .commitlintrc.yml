extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - refactor
      - test
      - chore
      - docs
      - ci
      - build
      - perf
      - style
  scope-enum:
    - 2
    - always
    - - db
      - store
      - auth
      - api
      - recurrence
      - scheduler
      - notify
      - telegram
      - web
      - i18n
      - tui
      - cli
      - admin
      - docker
      - ci
      - crypto
      - config
  subject-full-stop:
    - 2
    - never
    - "."
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 2
    - always
    - 100
